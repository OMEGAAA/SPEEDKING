<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロアジリティタイマー(ランキング登録)</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090c;
      --line: rgba(255, 255, 255, 0.12);
      --text: #f7f3ea;
      --dim: #8b93a1;
      --accent: #e7bd56;
      --accent-2: #ffdf85;
      --ok: #4ade80;
      --warn: #fbbf24;
      --err: #ff6b6b;
      --mono: "Cascadia Mono", "Consolas", monospace;
      --serif: Georgia, "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", serif;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background:
        radial-gradient(120% 90% at 50% 30%, #10141b 0%, var(--bg) 62%);
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* ---- 上部バー ---- */
    header {
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px; padding: 14px 20px;
    }
    .event-title {
      font-family: var(--serif);
      color: var(--accent-2);
      font-size: 17px; letter-spacing: .14em;
    }
    .top-right { display: flex; align-items: center; gap: 10px; }
    .state {
      font-size: 12.5px; padding: 5px 12px; border-radius: 999px;
      border: 1px solid var(--line); color: var(--dim); white-space: nowrap;
    }
    .state.online { color: var(--ok); border-color: var(--ok); }
    .state.arming { color: var(--warn); border-color: var(--warn); }
    .state.err { color: var(--err); border-color: var(--err); }
    .settings { display: flex; gap: 10px; align-items: center; }
    .settings label { color: var(--dim); font-size: 11.5px; display: flex; align-items: center; gap: 5px; }
    .settings input {
      background: rgba(255, 255, 255, 0.04); color: var(--text);
      border: 1px solid var(--line); border-radius: 6px;
      padding: 4px 8px; font-size: 12.5px;
    }
    .settings input#testName { width: 110px; }
    .settings input#finishCount { width: 48px; }
    .settings select {
      background: rgba(255, 255, 255, 0.04); color: var(--text);
      border: 1px solid var(--line); border-radius: 6px;
      padding: 4px 8px; font-size: 12.5px; font-family: inherit;
    }
    .settings select option { background: #14181c; }

    /* ---- 中央: タイム ---- */
    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 34vw);
      align-items: center;
      gap: clamp(18px, 3vw, 42px);
      width: 100%; min-height: 0; padding: 0 clamp(16px, 3vw, 44px);
    }
    .timer-panel {
      display: grid; place-content: center; justify-items: center;
      gap: clamp(8px, 2vh, 22px); min-width: 0; text-align: center;
    }
    #bigTime {
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      font-size: min(17vw, 38vh);
      line-height: 1;
      letter-spacing: .01em;
      color: var(--text);
      transition: color .25s ease;
    }
    #bigTime .unit {
      font-size: .28em; color: var(--dim); font-weight: 600; margin-left: .12em;
    }
    #bigTime.waiting { color: var(--dim); }
    #bigTime.final {
      color: var(--accent);
      text-shadow: 0 0 60px rgba(231, 189, 86, 0.35);
    }
    @keyframes lockPulse {
      0% { transform: scale(1); }
      35% { transform: scale(1.045); }
      100% { transform: scale(1); }
    }
    @media (prefers-reduced-motion: no-preference) {
      #bigTime.final { animation: lockPulse .5s ease; }
    }

    /* 光電管ゲートインジケータ: 横切り1回 = ビーム1本が点灯 */
    #gates { display: flex; gap: clamp(10px, 2vw, 22px); }
    #gates .gate {
      width: clamp(6px, 1vw, 10px);
      height: clamp(26px, 6vh, 52px);
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.10);
      transition: background .2s ease, box-shadow .2s ease;
    }
    #gates .gate.lit {
      background: var(--accent);
      box-shadow: 0 0 14px rgba(231, 189, 86, 0.55);
    }
    #phase { font-size: clamp(14px, 2.4vh, 20px); color: var(--dim); letter-spacing: .12em; }
    #phase.final { color: var(--accent-2); }

    .latest-lap {
      display: flex; justify-content: space-between; align-items: baseline;
      width: min(100%, 440px); min-height: 48px; padding: 7px 14px;
      border: 1px solid rgba(231, 189, 86, 0.35); border-radius: 9px;
      background: rgba(231, 189, 86, 0.06); color: var(--dim);
    }
    #latestLapLabel { font-size: 12px; letter-spacing: .08em; }
    .latest-lap-value {
      color: var(--accent-2); font-family: var(--mono); font-variant-numeric: tabular-nums;
      font-size: clamp(22px, 3.2vh, 30px); font-weight: 800; line-height: 1;
    }
    .latest-lap-value .unit { margin-left: 5px; color: var(--dim); font-size: .5em; }
    @keyframes lapFlash {
      0% { transform: scale(1); background: rgba(231, 189, 86, 0.06); }
      35% { transform: scale(1.035); background: rgba(231, 189, 86, 0.22); box-shadow: 0 0 26px rgba(231, 189, 86, .2); }
      100% { transform: scale(1); background: rgba(231, 189, 86, 0.06); }
    }
    @media (prefers-reduced-motion: no-preference) {
      .latest-lap.flash { animation: lapFlash .55s ease; }
    }

    /* ---- 通過タイム / 区間ラップ ---- */
    .lap-panel {
      width: min(100%, 440px); overflow: hidden;
      border: 1px solid var(--line); border-radius: 9px;
      background: rgba(255, 255, 255, 0.025); text-align: left;
    }
    .lap-head, .lap-row {
      display: grid; grid-template-columns: 64px minmax(90px, 1fr) minmax(90px, 1fr);
      align-items: center; column-gap: 10px; padding: 6px 12px;
    }
    .lap-head {
      color: var(--dim); border-bottom: 1px solid var(--line);
      font-size: 10.5px; letter-spacing: .08em;
    }
    #lapRows { max-height: 122px; overflow-y: auto; scrollbar-width: thin; }
    .lap-row {
      min-height: 30px; color: var(--dim); font-size: 12.5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .lap-row:last-child { border-bottom: 0; }
    .lap-row.latest { color: var(--text); background: rgba(231, 189, 86, 0.08); }
    .lap-number { font-weight: 700; }
    .lap-time {
      color: var(--text); font-family: var(--mono); font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .lap-row.latest .lap-time:last-child { color: var(--accent-2); }
    .lap-empty { padding: 9px 12px; color: var(--dim); font-size: 12px; text-align: center; }

    /* ---- ランキング登録パネル(カメラの代わり) ---- */
    .register-panel {
      min-width: 0; border: 1px solid var(--line); border-radius: 12px;
      background: rgba(0, 0, 0, 0.28); overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
      display: grid; grid-template-rows: auto 1fr auto;
      max-height: min(78vh, 620px);
    }
    .register-head {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; padding: 9px 12px; color: var(--dim); font-size: 12px;
      border-bottom: 1px solid var(--line); letter-spacing: .08em;
    }
    .register-body { padding: 14px 12px; display: grid; gap: 10px; align-content: start; overflow-y: auto; }
    .register-body label { color: var(--dim); font-size: 12px; display: grid; gap: 5px; }
    .register-body input {
      background: rgba(255, 255, 255, 0.04); color: var(--text);
      border: 1px solid var(--line); border-radius: 8px;
      padding: 11px 12px; font-size: 16px; width: 100%;
    }
    #scoreInput { font-family: var(--mono); font-variant-numeric: tabular-nums; }
    #registerBtn {
      padding: 13px 10px; font-size: 16px; font-weight: 700;
      background: var(--accent); color: #221a08;
      border: none; border-radius: 8px; cursor: pointer;
    }
    #registerBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #registerMsg { min-height: 18px; color: var(--ok); font-size: 12.5px; text-align: center; }
    .recent-title { color: var(--dim); font-size: 11px; letter-spacing: .08em; margin-top: 4px; }
    .recent { list-style: none; padding: 0; margin: 0; font-size: 13.5px; }
    .recent li {
      display: flex; justify-content: space-between; gap: 10px;
      padding: 6px 2px; border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .recent li:last-child { border-bottom: 0; }
    .recent .t { font-family: var(--mono); color: var(--accent-2); white-space: nowrap; }
    .register-foot { padding: 10px 12px; border-top: 1px solid var(--line); }
    #openRanking {
      width: 100%; padding: 9px 10px; font-size: 13px;
      color: var(--text); background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line); border-radius: 8px; cursor: pointer;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: minmax(0, 1fr) minmax(260px, 38vw); gap: 14px; padding-inline: 16px; }
      #bigTime { font-size: min(16vw, 34vh); }
    }

    /* ---- 下部: 操作バー ---- */
    footer {
      display: flex; justify-content: center; align-items: center;
      gap: 12px; padding: 14px 20px 20px;
    }
    button {
      background: var(--accent); color: #221a08;
      border: none; border-radius: 8px; cursor: pointer;
      padding: 9px 18px; font-size: 14px; font-weight: 700;
      font-family: inherit;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #measureBtn { background: transparent; color: var(--text); border: 1px solid var(--line); font-weight: 500; }

    #unsupported {
      display: none; color: var(--err); border: 1px solid var(--err);
      border-radius: 8px; padding: 10px 14px; margin: 10px 20px 0; font-size: 14px;
    }

    :focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; }
  </style>
</head>

<body>
  <header>
    <div class="event-title">プロアジリティタイマー</div>
    <div class="top-right">
      <span id="state" class="state">未接続</span>
      <div class="settings">
        <label>モード<select id="modeSelect">
          <option value="pro-agility-2_5" selected>2.5m-2.5m</option>
          <option value="pro-agility-5">5m-5m</option>
        </select></label>
        <label>テスト名<input type="text" id="testName" value="Proagility2"></label>
        <label>完了回数<input type="number" id="finishCount" value="4" min="1" max="20" step="1"></label>
      </div>
    </div>
  </header>

  <div id="unsupported">このブラウザは WebHID 非対応です。Chrome か Edge で開いてください。</div>

  <main>
    <section class="timer-panel" aria-label="計測タイマー">
      <div id="bigTime" class="waiting">--<span class="unit">秒</span></div>
      <div id="gates"></div>
      <div id="phase">計測ボタンで開始</div>
      <div id="latestLap" class="latest-lap" aria-live="polite">
        <span id="latestLapLabel">直近ラップ</span>
        <strong id="latestLapTime" class="latest-lap-value">--<span class="unit">秒</span></strong>
      </div>
      <div class="lap-panel" aria-label="通過タイムと区間ラップ">
        <div class="lap-head" aria-hidden="true">
          <span>通過</span><span style="text-align:right">累計</span><span style="text-align:right">ラップ</span>
        </div>
        <div id="lapRows" aria-live="polite"></div>
      </div>
    </section>

    <aside class="register-panel" aria-label="ランキング登録">
      <div class="register-head">
        <span>ランキング登録</span>
        <span id="registerState">タイム待ち</span>
      </div>
      <div class="register-body">
        <label>選手名 / ゼッケン番号
          <input type="text" id="nameInput" placeholder="例)山田 太郎" autocomplete="off">
        </label>
        <label>タイム(秒) — 確定すると自動入力
          <input type="text" id="scoreInput" placeholder="--" inputmode="decimal" autocomplete="off">
        </label>
        <button id="registerBtn" disabled>ランキングに登録</button>
        <div id="registerMsg"></div>
        <div class="recent-title">最近の登録</div>
        <ul class="recent" id="recent"></ul>
      </div>
      <div class="register-foot">
        <button id="openRanking" type="button">ランキング表を開く</button>
      </div>
    </aside>
  </main>

  <footer>
    <button id="measureBtn">計測</button>
    <button id="testCrossingBtn" type="button" hidden>疑似通過</button>
  </footer>

  <script src="firebase-config.js"></script>
  <script type="module" src="firebase-ranking.js"></script>
  <script type="module">
    import {
      buildTestStart, scanFrames, parseError, parseTestResultEvent, BaseCmd, WittyCmd,
    } from './witty-protocol.js';

    const $ = (id) => document.getElementById(id);

    if (!('hid' in navigator)) { $('unsupported').style.display = 'block'; }

    const STORAGE_KEY = 'ranking-app-entries'; // ランキング表 index.html と共有
    let rankingStore = null;
    let stopRankingSync = null;
    let cloudEntries = [];
    let device = null;
    let mode = 'disconnected'; // disconnected | idle | arming | online
    let wantArm = false;       // 再列挙をまたいで「開始したい」意思を保持
    let armAttempts = 0;
    const MAX_ARM_ATTEMPTS = 5;
    // 測定モードのプリセット。テスト名はWittyタイマーに登録済みの名称に合わせる。
    const MODES = {
      'pro-agility-2_5': { testName: 'Proagility2', finishCount: 4 },
      'pro-agility-5': { testName: 'Proagility', finishCount: 2 },
    };
    const DEFAULT_FINISH_CROSSING_COUNT = MODES['pro-agility-2_5'].finishCount;
    const TEST_MODE = new URLSearchParams(location.search).has('test');
    let currentRun = [];
    let lastAnimatedLapCount = 0;

    function getFinishCrossingCount() {
      const parsed = Math.floor(Number($('finishCount').value));
      if (!Number.isFinite(parsed)) return DEFAULT_FINISH_CROSSING_COUNT;
      return Math.min(20, Math.max(1, parsed));
    }

    function log(msg) { console.log(`[witty-register] ${msg}`); }

    function setState(text, cls) { const s = $('state'); s.textContent = text; s.className = 'state' + (cls ? ' ' + cls : ''); }
    function setMode(m) {
      mode = m;
      const btn = $('measureBtn');
      btn.disabled = (m === 'arming');
      if (m === 'online') { setState('計測中', 'online'); btn.textContent = '計測'; }
      else if (m === 'arming') { setState('計測開始中…', 'arming'); btn.textContent = '開始中…'; }
      else if (m === 'idle') { setState('接続済み(未開始)'); btn.textContent = '計測'; }
      else { setState('未接続'); btn.textContent = '計測'; }
    }

    // --- HID 受信処理 ---
    function onInputReport(e) {
      const data = new Uint8Array(e.data.buffer, e.data.byteOffset, e.data.byteLength);
      if (data.every(b => b === 0xff)) return; // アイドル
      const frames = scanFrames(data);
      for (const f of frames) handleFrame(f);
    }

    function handleFrame(f) {
      if (f.command === BaseCmd.ERROR) {
        const err = parseError(f.payload);
        if (err && err.failedCommand === WittyCmd.SET_TEST_START) {
          wantArm = false;
          setMode('idle');
          setState('開始失敗: テスト名を確認 (code ' + err.errorCode + ')', 'err');
        }
        return;
      }
      if (f.command === WittyCmd.SET_TEST_START && f.isResponse) {
        wantArm = false; armAttempts = 0;
        setMode('online');
        log('計測開始 受理(オンライン計測モード)');
        return;
      }
      if (f.command === WittyCmd.EVENT_TEST_RESULTS) {
        const ev = parseTestResultEvent(f.payload);
        if (ev) onCrossing(ev);
      }
    }

    // --- 横切り処理(witty-display.html と同じ判定ロジック) ---
    function onCrossing(ev) {
      const last = currentRun[currentRun.length - 1];
      if (last && last.tick === ev.tick && last.counter === ev.counter) return; // 重複
      if (last && ev.tick < last.tick) currentRun = [];  // タイマー側で新しい走が始まった
      currentRun.push(ev);
      render();
      log(`横切り#${currentRun.length} tick=${ev.tick}`);
    }

    // --- 表示 ---
    function render() {
      const finishCount = getFinishCrossingCount();
      const big = $('bigTime');
      const phase = $('phase');
      const done = Math.min(currentRun.length, finishCount);
      const finished = currentRun.length >= finishCount;

      renderGates(finishCount, done);
      renderLatestLap(finishCount);
      renderLaps(finishCount);

      if (currentRun.length === 0) {
        big.className = 'waiting';
        big.innerHTML = '--<span class="unit">秒</span>';
        phase.className = '';
        phase.textContent = (mode === 'online') ? 'スタート待ち' : '計測ボタンで開始';
        setOfficialScore(null);
        return;
      }

      // タイムは witty-display.html と同じ方式(tickの絶対秒をそのまま表示)。
      // 走ごとのタイムリセットは、計測ボタンで計測開始コマンドを再送して行う。
      if (finished) {
        const official = currentRun[finishCount - 1].seconds;
        big.className = 'final';
        big.innerHTML = `${official.toFixed(2)}<span class="unit">秒</span>`;
        phase.className = 'final';
        phase.textContent = '確定タイム';
        setOfficialScore(official);
      } else {
        const latest = currentRun[currentRun.length - 1].seconds;
        big.className = '';
        big.innerHTML = `${latest.toFixed(2)}<span class="unit">秒</span>`;
        phase.className = '';
        phase.textContent = `計測中 ${done}/${finishCount}`;
        setOfficialScore(null, done, finishCount);
      }
    }

    function getLapSeconds(events, index) {
      if (index <= 0) return events[0]?.seconds ?? null;
      return Math.max(0, events[index].seconds - events[index - 1].seconds);
    }

    function renderLatestLap(finishCount) {
      const events = currentRun.slice(0, finishCount);
      const box = $('latestLap');
      const label = $('latestLapLabel');
      const value = $('latestLapTime');

      if (!events.length) {
        lastAnimatedLapCount = 0;
        label.textContent = '直近ラップ';
        value.innerHTML = '--<span class="unit">秒</span>';
        box.classList.remove('flash');
        return;
      }

      const index = events.length - 1;
      const lapSeconds = getLapSeconds(events, index);
      label.textContent = index === 0 ? '1回目タイム' : `直近ラップ #${index + 1}`;
      value.innerHTML = `${lapSeconds.toFixed(2)}<span class="unit">秒</span>`;

      if (events.length !== lastAnimatedLapCount) {
        lastAnimatedLapCount = events.length;
        box.classList.remove('flash');
        void box.offsetWidth;
        box.classList.add('flash');
      }
    }

    function renderLaps(finishCount) {
      const rows = $('lapRows');
      const events = currentRun.slice(0, finishCount);
      rows.innerHTML = '';

      if (!events.length) {
        const empty = document.createElement('div');
        empty.className = 'lap-empty';
        empty.textContent = '通過するとラップタイムが表示されます';
        rows.appendChild(empty);
        return;
      }

      events.forEach((event, index) => {
        const lap = getLapSeconds(events, index);
        const row = document.createElement('div');
        row.className = 'lap-row' + (index === events.length - 1 ? ' latest' : '');

        const number = document.createElement('span');
        number.className = 'lap-number';
        number.textContent = `#${index + 1}`;

        const cumulative = document.createElement('span');
        cumulative.className = 'lap-time';
        cumulative.textContent = `${event.seconds.toFixed(2)} 秒`;

        const interval = document.createElement('span');
        interval.className = 'lap-time';
        interval.textContent = `${lap.toFixed(2)} 秒`;

        row.append(number, cumulative, interval);
        rows.appendChild(row);
      });
      rows.scrollTop = rows.scrollHeight;
    }

    function renderGates(total, lit) {
      const box = $('gates');
      box.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const g = document.createElement('div');
        g.className = 'gate' + (i < lit ? ' lit' : '');
        box.appendChild(g);
      }
    }

    // --- ランキング登録(witty-measure.html と同じ保存形式) ---
    function setOfficialScore(seconds, done = 0, finishCount = getFinishCrossingCount()) {
      const stateEl = $('registerState');
      if (seconds == null) {
        $('scoreInput').value = '';
        stateEl.textContent = done > 0 ? `計測中 ${done}/${finishCount}` : 'タイム待ち';
      } else {
        $('scoreInput').value = seconds.toFixed(2);
        stateEl.textContent = 'タイム確定';
      }
      updateRegisterEnabled();
    }

    function updateRegisterEnabled() {
      const score = $('scoreInput').value;
      $('registerBtn').disabled = score === '' || Number.isNaN(Number(score));
    }

    function loadEntries() {
      try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
      catch (e) { return []; }
    }
    function saveEntries(entries) { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
    function notifyEntriesUpdated() {
      try {
        const channel = new BroadcastChannel('ranking-app');
        channel.postMessage({ type: 'entries-updated' });
        channel.close();
      } catch (e) {
        // ランキング表側は storage イベントとフォーカス時にも再読込するため、失敗しても致命的ではない
      }
    }

    function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

    function renderRecent() {
      const entries = rankingStore ? cloudEntries : loadEntries();
      const recent = entries.slice(-5).reverse();
      const ul = $('recent');
      ul.innerHTML = recent.length ? '' : '<li style="color:var(--dim);border:none;">まだ登録がありません</li>';
      recent.forEach(en => {
        const li = document.createElement('li');
        li.innerHTML = `<span>${escapeHtml(en.name)}</span><span class="t">${Number(en.score).toFixed(2)} 秒</span>`;
        ul.appendChild(li);
      });
    }

    let registerMsgTimer = null;
    function showRegisterMsg(text) {
      $('registerMsg').textContent = text;
      clearTimeout(registerMsgTimer);
      registerMsgTimer = setTimeout(() => { $('registerMsg').textContent = ''; }, 4000);
    }

    $('registerBtn').addEventListener('click', async () => {
      const name = $('nameInput').value.trim();
      const score = Number($('scoreInput').value);
      if (!name) { $('nameInput').focus(); showRegisterMsg('選手名を入力してください'); return; }
      if (!Number.isFinite(score) || score <= 0 || score > 86400) { $('scoreInput').focus(); return; }

      $('registerBtn').disabled = true;
      try {
        if (rankingStore) {
          await rankingStore.addEntry({ name, score });
        } else {
          const entries = loadEntries();
          entries.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2), name, score });
          saveEntries(entries);
          notifyEntriesUpdated();
        }

        log(`登録: ${name} — ${score.toFixed(2)}秒${rankingStore ? ' (Firebase同期)' : ' (ローカル待機)'}`);
        showRegisterMsg(rankingStore
          ? `同期しました: ${name} ${score.toFixed(2)}秒`
          : `ローカル保存しました: ${name} ${score.toFixed(2)}秒`);
        $('nameInput').value = '';
        renderRecent();
        // 次の選手に備えて表示クリア(計測はオンラインのまま)
        currentRun = [];
        render();
      } catch (error) {
        log('Firebase登録エラー: ' + error.message);
        showRegisterMsg('登録できませんでした。ネット接続を確認してください');
      } finally {
        updateRegisterEnabled();
      }
    });

    // 手入力でもタイムが入ればいつでも登録可
    $('scoreInput').addEventListener('input', updateRegisterEnabled);

    $('openRanking').addEventListener('click', () => { window.open('index.html'); });

    window.addEventListener('ranking-store-ready', async (event) => {
      rankingStore = event.detail;
      try {
        stopRankingSync = rankingStore.subscribe((entries) => {
          cloudEntries = entries;
          renderRecent();
        }, (error) => {
          log('ランキング同期エラー: ' + error.message);
          showRegisterMsg('Firebaseとの同期が切れました');
        });

        const localEntries = loadEntries();
        if (localEntries.length > 0) {
          await rankingStore.importLocalEntries(localEntries);
          localStorage.removeItem(STORAGE_KEY);
          notifyEntriesUpdated();
        }
        showRegisterMsg('Firebaseリアルタイム同期に接続しました');
      } catch (error) {
        log('ランキング初期化エラー: ' + error.message);
        showRegisterMsg('Firebaseに接続できませんでした');
      }
    });

    window.addEventListener('ranking-store-error', (event) => {
      log('Firebase接続エラー: ' + (event.detail?.message || event.detail));
      showRegisterMsg('オフラインのためローカル保存で動作します');
    });

    window.addEventListener('beforeunload', () => {
      if (stopRankingSync) stopRankingSync();
    });

    // --- 接続・開始の自動化(witty-display.html と同じシーケンス) ---
    async function attachDevice(dev) {
      device = dev;
      if (!device.opened) await device.open();
      device.removeEventListener('inputreport', onInputReport);
      device.addEventListener('inputreport', onInputReport);
      log(`接続: ${device.productName || '(名称なし)'} PID=0x${device.productId.toString(16)}`);
    }

    async function sendStart() {
      if (!device) return;
      try {
        const frame = buildTestStart($('testName').value);
        await device.sendReport(0, frame);
        log(`計測開始コマンド送信 (試行${armAttempts})`);
      } catch (e) {
        log('送信失敗: ' + e.message + '(再列挙中かもしれません)');
      }
    }

    async function arm() {
      wantArm = true; armAttempts = 1;
      setMode('arming');
      if (TEST_MODE) {
        wantArm = false;
        setMode('online');
        return;
      }
      await sendStart();
    }

    $('measureBtn').addEventListener('click', async () => {
      if (mode === 'online') {
        // 表示をクリアし、計測開始コマンドを再送してタイマーのタイムをリセット
        currentRun = []; render();
        await arm();
        return;
      }
      if (mode === 'idle') { await arm(); return; }
      // 未接続 → 接続してそのまま計測開始
      try {
        const devs = await navigator.hid.requestDevice({ filters: [{ vendorId: 0x16d0 }] });
        if (!devs.length) return;
        await attachDevice(devs[0]);
        await arm();
      } catch (e) { log('接続エラー: ' + e.message); setState('接続失敗', 'err'); }
    });

    // 再列挙対応: 切断されても開始意思があれば待ち受け
    navigator.hid && navigator.hid.addEventListener('disconnect', (e) => {
      if (device && e.device === device) {
        device = null;
        if (wantArm || mode === 'online') {
          setState('再接続待ち…', 'arming');
          log('切断 — 再接続を待機します');
        } else { setMode('disconnected'); }
      }
    });

    navigator.hid && navigator.hid.addEventListener('connect', async (e) => {
      if (device || e.device.vendorId !== 0x16d0) return;
      if (!wantArm && mode !== 'online') return;
      log('タイマー再出現 — 自動再接続します');
      try {
        await attachDevice(e.device);
        if (wantArm && armAttempts < MAX_ARM_ATTEMPTS) {
          armAttempts++;
          setMode('arming');
          setTimeout(sendStart, 500); // 起動直後は少し待ってから
        } else if (wantArm) {
          wantArm = false; setState('開始できませんでした(再試行上限)', 'err'); setMode('idle');
        } else {
          setMode('online');
        }
      } catch (err) { log('自動再接続失敗: ' + err.message); }
    });

    $('finishCount').addEventListener('input', render);
    $('modeSelect').addEventListener('change', () => {
      const preset = MODES[$('modeSelect').value];
      if (!preset) return;
      $('testName').value = preset.testName;
      $('finishCount').value = preset.finishCount;
      render();
      log(`測定モード変更: ${$('modeSelect').value === 'pro-agility-5' ? '5m-5m' : '2.5m-2.5m'} (テスト名=${preset.testName}, 完了回数=${preset.finishCount})`);
    });

    // 実機なしで表示を確認するための検証用フック(本番動作には影響しない)
    window.__simulateCrossing = (seconds) => {
      const counter = (currentRun[currentRun.length - 1]?.counter ?? 0) + 1;
      onCrossing({ tick: Math.round(seconds * 25000), counter, seconds });
    };

    if (TEST_MODE) {
      let testSeconds = 0;
      $('testCrossingBtn').hidden = false;
      $('testCrossingBtn').addEventListener('click', () => {
        testSeconds += 1.25;
        window.__simulateCrossing(testSeconds);
      });
    }

    setMode(TEST_MODE ? 'online' : 'disconnected');
    render();
    renderRecent();
  </script>
</body>

</html>
